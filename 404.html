<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/tuf-logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Universal Forums</title>
    <meta name="description" content="A community specialized in custom levels & clears of A Dance of Fire and Ice.">
  </head>
  <style>
    * {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #000000;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #ffffff;
    }
    h2 {
      font-size: 1rem;
      font-weight: 300;
      color: #ffffff80;
    }
    p {
      font-size: 1.2rem;
      color: #ffffff;
    }
    .background {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.9;
      background-image: url("/src/assets/important/dark/background-blurred.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: var(--color-black);
    }
    span {
      font-size: 0.8rem;
      margin-top: 0.5rem;
      color: #ffffff80;
    }
  </style>
  <body>
    <div class="background"></div>
    <h2>404</h2>
    <h1>Under Maintenance!</h1>
    <p>The website is currently being updated, please check back in a moment!</p>
    <span>It shouldn't take longer than a minute...</span>
  </body>
</html>
